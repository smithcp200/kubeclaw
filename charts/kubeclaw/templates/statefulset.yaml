{{- include "kubeclaw.validateValues" . }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "kubeclaw.gatewayName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeclaw.labels" . | nindent 4 }}
  {{- if .Values.tailscale.ssh.enabled }}
  annotations:
    # The Tailscale SSH sidecar intentionally runs as root (uid 0) so Tailscale
    # SSH can resolve a login name from /etc/passwd. uid 1000 has no entry in
    # the image's passwd file and SSH logins fail with "failed to look up 1000".
    # Running as root carries no extra risk in userspace-networking mode.
    ignore-check.kube-linter.io/run-as-non-root: "tailscale sidecar requires root for SSH username resolution"
  {{- end }}
spec:
  # replicas is hard-locked to 1. The Gateway is a stateful singleton that owns
  # an exclusive WebSocket listener and all session/channel state. Running multiple
  # replicas causes port-collision failures and data corruption. Enforced by
  # values.schema.json.
  replicas: 1
  selector:
    matchLabels:
      {{- include "kubeclaw.selectorLabels" . | nindent 6 }}
  serviceName: {{ include "kubeclaw.gatewayName" . }}
  template:
    metadata:
      labels:
        {{- include "kubeclaw.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: gateway
        {{- with .Values.pod.labels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- include "kubeclaw.configChecksum" . | nindent 8 }}
        {{- include "kubeclaw.envConfigChecksum" . | nindent 8 }}
        {{- if .Values.litellm.enabled }}
        checksum/litellm-config: {{ .Values.litellm.proxy_config | toJson | sha256sum }}
        {{- end }}
        {{- with .Values.pod.annotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "kubeclaw.serviceAccountName" . }}
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        fsGroup: 1000
        {{- include "kubeclaw.seLinuxOptions" . | nindent 8 }}
        seccompProfile:
          type: RuntimeDefault
      {{- with .Values.pod.runtimeClassName }}
      runtimeClassName: {{ . }}
      {{- end }}
      {{- with .Values.pod.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.pod.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.pod.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      # ---------------------------------------------------------------------------
      # initContainers
      # ---------------------------------------------------------------------------
      {{- if or .Values.persistence.fixPermissions.enabled .Values.egressFilter.enabled }}
      initContainers:
        {{- if .Values.persistence.fixPermissions.enabled }}
        # fix-permissions: normalize state dir ownership/mode for secure runtime.
        - name: fix-permissions
          image: {{ include "kubeclaw.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              mkdir -p /data/credentials /data/agents/main/sessions /data/agents/main/agent /data/workspace/employees /data/devices || true
              chown -R 1000:1000 /data || true
              chmod 700 /data /data/credentials /data/agents /data/agents/main /data/agents/main/sessions /data/agents/main/agent /data/workspace /data/workspace/employees /data/devices || true
          volumeMounts:
            - name: {{ include "kubeclaw.statePvcName" . }}
              mountPath: /data
              {{- if .Values.persistence.splitVolumes }}
              subPath: state
              {{- end }}
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 32Mi
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
        {{- end }}
        {{- if .Values.egressFilter.enabled }}
        # dns-init: resolves the egress-filter Service to a ClusterIP and writes
        # a resolv.conf that routes all DNS through Blocky. Uses the default
        # cluster DNS (available at this point) to look up the Service IP.
        - name: dns-init
          image: {{ include "kubeclaw.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              FILTER_IP=$(getent hosts {{ include "kubeclaw.egressFilterName" . }}.{{ .Release.Namespace }}.svc.cluster.local | awk '{print $1}')
              if [ -z "$FILTER_IP" ]; then
                echo "ERROR: Could not resolve {{ include "kubeclaw.egressFilterName" . }}" >&2
                exit 1
              fi
              echo "Resolved egress-filter Service to $FILTER_IP"
              cat > /etc/resolv-override/resolv.conf <<EOF
              nameserver $FILTER_IP
              search {{ .Release.Namespace }}.svc.cluster.local svc.cluster.local cluster.local
              options ndots:5
              EOF
              # strip leading whitespace from heredoc indentation
              sed -i 's/^[[:space:]]*//' /etc/resolv-override/resolv.conf
              echo "Wrote /etc/resolv-override/resolv.conf:"
              cat /etc/resolv-override/resolv.conf
          volumeMounts:
            - name: resolv-override
              mountPath: /etc/resolv-override
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 32Mi
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
        {{- end }}
      {{- end }}

      containers:
        # -------------------------------------------------------------------------
        # Gateway container
        # -------------------------------------------------------------------------
        - name: gateway
          image: {{ include "kubeclaw.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/bin/sh", "/opt/kubeclaw/bin/bootstrap.sh", "node", "dist/index.js", "gateway"]
          ports:
            - name: gateway
              containerPort: 18789
              protocol: TCP
          env:
            - name: KUBECLAW_CONFIG_MODE
              value: {{ .Values.config.mode | quote }}
            - name: KUBECLAW_SKILLSTACKS_ENABLED
              value: {{ .Values.skillStacks.enabled | quote }}
            - name: KUBECLAW_SKILLS_WATCH
              value: {{ .Values.skillStacks.watch | quote }}
            - name: KUBECLAW_SKILLS_NODE_MANAGER
              value: {{ .Values.skillStacks.nodeManager | quote }}
            - name: KUBECLAW_SKILLS_EXTRA_DIRS_JSON
              value: {{ if .Values.obsidian.enabled }}{{ append .Values.skillStacks.extraDirs "/vaults" | toJson | quote }}{{ else }}{{ .Values.skillStacks.extraDirs | toJson | quote }}{{ end }}
            - name: KUBECLAW_SKILLSTACK_PLATFORM_ENGINEERING_ENABLED
              value: {{ .Values.skillStacks.platformEngineering.enabled | quote }}
            - name: KUBECLAW_SKILLSTACK_DEVOPS_ENABLED
              value: {{ .Values.skillStacks.devops.enabled | quote }}
            - name: KUBECLAW_SKILLSTACK_SRE_ENABLED
              value: {{ .Values.skillStacks.sre.enabled | quote }}
            - name: KUBECLAW_SKILLSTACK_SWE_ENABLED
              value: {{ .Values.skillStacks.swe.enabled | quote }}
            - name: KUBECLAW_SKILLSTACK_QA_ENABLED
              value: {{ .Values.skillStacks.qa.enabled | quote }}
            - name: KUBECLAW_SKILLSTACK_MARKETING_ENABLED
              value: {{ .Values.skillStacks.marketing.enabled | quote }}
            {{- if and .Values.observability.enabled .Values.observability.gateway.enabled }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "k8s.pod.name=$(POD_NAME),k8s.namespace.name=$(POD_NAMESPACE),k8s.node.name=$(NODE_NAME){{- if .Values.observability.gateway.resourceAttributes }},{{ .Values.observability.gateway.resourceAttributes }}{{- end }}"
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "kubeclaw.fullname" . }}-env
            - secretRef:
                name: {{ include "kubeclaw.secretName" . }}
          volumeMounts:
            - name: {{ include "kubeclaw.statePvcName" . }}
              mountPath: /home/node/.openclaw
              {{- if .Values.persistence.splitVolumes }}
              subPath: state
              {{- end }}
            {{- if .Values.persistence.splitVolumes }}
            - name: {{ include "kubeclaw.workspacePvcName" . }}
              mountPath: /home/node/.openclaw/workspace
            {{- end }}
            - name: tmp
              mountPath: /tmp
            {{- if .Values.config.desired }}
            - name: config-src
              mountPath: /config-src
              readOnly: true
            {{- end }}
            {{- if .Values.egressFilter.enabled }}
            - name: resolv-override
              mountPath: /etc/resolv.conf
              subPath: resolv.conf
              readOnly: true
            {{- end }}
            {{- if .Values.obsidian.enabled }}
            - name: {{ include "kubeclaw.obsidianPvcName" . }}
              mountPath: {{ .Values.obsidian.mountPath }}
            {{- end }}
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          # -----------------------------------------------------------------------
          # Health Probes
          # Startup uses tcpSocket for speed — avoids spawning a Node.js process
          # on every probe during boot. Once the startup probe passes, liveness
          # and readiness switch to the token-authenticated health command for a
          # deeper control-plane check.
          # -----------------------------------------------------------------------

          # Startup probe: TCP check until the Gateway binds port 18789.
          # Allow up to 5 minutes for first startup (30 * 10s).
          startupProbe:
            tcpSocket:
              port: gateway
            initialDelaySeconds: 5
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 3

          # Liveness/readiness use a lightweight TCP check on the gateway port
          # (same as the startup probe). The previous `node dist/index.js health`
          # exec cold-starts a full Node process (loads all plugins) on every
          # probe, which exceeds even a 30s timeout under CPU/DNS contention —
          # tripping liveness and crash-looping a gateway that is actually fine.
          # TCP-readiness is sufficient: the port being open means the gateway
          # HTTP server is serving (which is what the web WS-proxy connects to).
          livenessProbe:
            tcpSocket:
              port: gateway
            failureThreshold: 6
            periodSeconds: 30
            timeoutSeconds: 5

          # Readiness probe: remove from Service endpoints when not ready.
          readinessProbe:
            tcpSocket:
              port: gateway
            failureThreshold: 3
            periodSeconds: 10
            timeoutSeconds: 5

        # -------------------------------------------------------------------------
        # Tailscale sidecar (optional)
        # Provides SSH access into the pod via the tailnet.
        # -------------------------------------------------------------------------
        {{- if .Values.tailscale.ssh.enabled }}
        - name: tailscale
          image: {{ .Values.tailscale.ssh.image.repository }}:{{ .Values.tailscale.ssh.image.tag }}
          imagePullPolicy: {{ .Values.tailscale.ssh.image.pullPolicy }}
          env:
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubeclaw.tailscaleAuthKeySecretName" . }}
                  key: {{ include "kubeclaw.tailscaleAuthKeySecretKey" . }}
            - name: TS_HOSTNAME
              value: {{ include "kubeclaw.tailscaleHostname" . | quote }}
            # Use a subdirectory of the shared tmp emptyDir so uid 1000 can
            # create and chmod it freely. /var/lib/tailscale is root-owned on
            # mount and chmod fails with "operation not permitted".
            - name: TS_STATE_DIR
              value: /tmp/tailscale-state
            # Disable the Kubernetes Secret state backend. We use TS_STATE_DIR
            # (emptyDir or PVC) instead. Without this the client attempts to
            # get/update a Secret named "tailscale" and logs RBAC errors.
            - name: TS_KUBE_SECRET
              value: ""
            - name: TS_USERSPACE
              value: {{ .Values.tailscale.ssh.userspace | quote }}
            - name: TS_EXTRA_ARGS
              value: "--ssh"
            {{- with .Values.tailscale.ssh.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.tailscale.ssh.userspace }}
          # Run as root in userspace mode. Tailscale SSH requires a resolvable
          # username — uid 1000 has no /etc/passwd entry in this image so SSH
          # logins fail with "failed to look up 1000". Root is always resolvable
          # and carries no extra risk in userspace networking mode (no host
          # network access, no kernel bypass).
          # runAsNonRoot: false overrides the pod-level securityContext.
          # readOnlyRootFilesystem is safe because TS_STATE_DIR points to /tmp
          # (the shared emptyDir), so no writes to the root FS are needed.
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          {{- else }}
          # Kernel networking mode: requires NET_ADMIN and runs as root.
          # readOnlyRootFilesystem is safe because TS_STATE_DIR points to /tmp.
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
            readOnlyRootFilesystem: true
            capabilities:
              add:
                - NET_ADMIN
          {{- end }}
          # On pod shutdown, log out of Tailscale so the device is removed from
          # the admin console. With ephemeral auth keys the node disappears
          # immediately; with reusable keys it is marked "logged out".
          lifecycle:
            preStop:
              exec:
                command:
                  - tailscale
                  - logout
          resources:
            {{- toYaml .Values.tailscale.ssh.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          # Startup/liveness probes use `tailscale --version` which exits 0
          # immediately from compiled-in data. The tailscale/tailscale image is
          # distroless so no shell is available; avoid any /bin/sh commands.
          startupProbe:
            exec:
              command:
                - tailscale
                - --version
            failureThreshold: 24
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command:
                - tailscale
                - --version
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 3
        {{- end }}

      # ---------------------------------------------------------------------------
      # Volumes (non-PVC)
      # ---------------------------------------------------------------------------
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi
        {{- if .Values.config.desired }}
        - name: config-src
          configMap:
            name: {{ include "kubeclaw.configmapName" . }}
            items:
              - key: openclaw.json
                path: openclaw.json
        {{- end }}
        {{- if .Values.egressFilter.enabled }}
        - name: resolv-override
          emptyDir:
            sizeLimit: 1Mi
        {{- end }}
        {{- if and .Values.tailscale.ssh.enabled (not .Values.tailscale.ssh.persistState) }}
        - name: ts-state
          emptyDir: {}
        {{- end }}

  # ---------------------------------------------------------------------------
  # volumeClaimTemplates — PVCs provisioned and owned by the StatefulSet.
  # These persist across pod restarts and deletions (must be deleted manually).
  # ---------------------------------------------------------------------------
  volumeClaimTemplates:
    - metadata:
        name: {{ include "kubeclaw.statePvcName" . }}
      spec:
        accessModes: {{ toYaml .Values.persistence.accessModes | nindent 10 }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
    {{- if .Values.persistence.splitVolumes }}
    - metadata:
        name: {{ include "kubeclaw.workspacePvcName" . }}
      spec:
        accessModes: {{ toYaml .Values.persistence.workspace.accessModes | nindent 10 }}
        {{- if .Values.persistence.workspace.storageClass }}
        storageClassName: {{ .Values.persistence.workspace.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.workspace.size }}
    {{- end }}
    {{- if .Values.obsidian.enabled }}
    - metadata:
        name: {{ include "kubeclaw.obsidianPvcName" . }}
      spec:
        accessModes: {{ toYaml .Values.obsidian.persistence.accessModes | nindent 10 }}
        {{- if .Values.obsidian.persistence.storageClass }}
        storageClassName: {{ .Values.obsidian.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.obsidian.persistence.size }}
    {{- end }}
    {{- if and .Values.tailscale.ssh.enabled .Values.tailscale.ssh.persistState }}
    - metadata:
        name: ts-state
      spec:
        accessModes: {{ toYaml .Values.tailscale.ssh.stateStorage.accessModes | nindent 10 }}
        {{- if .Values.tailscale.ssh.stateStorage.storageClass }}
        storageClassName: {{ .Values.tailscale.ssh.stateStorage.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.tailscale.ssh.stateStorage.size }}
    {{- end }}
