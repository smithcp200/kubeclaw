{{- if .Values.diagnostics.enabled }}
# Diagnostics CronJob
# Runs openclaw doctor --yes and openclaw status --all on a schedule.
# Output goes to pod logs (configure your logging stack to capture these).
# Uses the same image as the Gateway — no separate binary needed.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "kubeclaw.fullname" . }}-diagnostics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeclaw.labels" . | nindent 4 }}
    app.kubernetes.io/component: diagnostics
spec:
  schedule: {{ .Values.diagnostics.schedule | quote }}
  concurrencyPolicy: {{ .Values.diagnostics.concurrencyPolicy }}
  successfulJobsHistoryLimit: {{ .Values.diagnostics.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.diagnostics.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            {{- include "kubeclaw.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: diagnostics
        spec:
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          serviceAccountName: {{ include "kubeclaw.serviceAccountName" . }}
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            {{- include "kubeclaw.seLinuxOptions" . | nindent 12 }}
          initContainers:
            # Fix PVC directory permissions. Many volume drivers mount with
            # root ownership, and the Gateway binary attempts chmod 700 on
            # ~/.openclaw at startup. Without this the diagnostics container
            # hits EPERM.
            - name: fix-permissions
              image: {{ include "kubeclaw.image" . }}
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command:
                - /bin/sh
                - -c
                - |
                  chown -R 1000:1000 /data || true
                  chmod 700 /data || true
              volumeMounts:
                - name: {{ include "kubeclaw.statePvcName" . }}
                  mountPath: /data
                  {{- if .Values.persistence.splitVolumes }}
                  subPath: state
                  {{- end }}
              resources:
                requests:
                  cpu: 10m
                  memory: 16Mi
                limits:
                  cpu: 100m
                  memory: 32Mi
              securityContext:
                runAsNonRoot: false
                runAsUser: 0
                runAsGroup: 0
                allowPrivilegeEscalation: false
          containers:
            - name: diagnostics
              image: {{ include "kubeclaw.image" . }}
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  echo "=== openclaw doctor ==="
                  node dist/index.js doctor --yes
                  echo "=== openclaw status{{ if .Values.diagnostics.statusAll }} --all{{ end }} ==="
                  node dist/index.js status{{ if .Values.diagnostics.statusAll }} --all{{ end }}
              {{- if .Values.diagnostics.nodeOptions }}
              env:
                - name: NODE_OPTIONS
                  value: {{ .Values.diagnostics.nodeOptions | quote }}
              {{- end }}
              envFrom:
                - configMapRef:
                    name: {{ include "kubeclaw.fullname" . }}-env
                - secretRef:
                    name: {{ include "kubeclaw.secretName" . }}
              volumeMounts:
                - name: {{ include "kubeclaw.statePvcName" . }}
                  mountPath: /home/node/.openclaw
                  {{- if .Values.persistence.splitVolumes }}
                  subPath: state
                  {{- end }}
                {{- if .Values.persistence.splitVolumes }}
                - name: {{ include "kubeclaw.workspacePvcName" . }}
                  mountPath: /home/node/.openclaw/workspace
                {{- end }}
                - name: tmp
                  mountPath: /tmp
              resources:
                {{- toYaml .Values.diagnostics.resources | nindent 16 }}
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
          # Reference existing PVCs created by the StatefulSet volumeClaimTemplates.
          # The PVC names are: <fullname>-state-<statefulset-pod-ordinal>
          # For a single-replica StatefulSet, pod ordinal is always 0.
          volumes:
            - name: {{ include "kubeclaw.statePvcName" . }}
              persistentVolumeClaim:
                claimName: {{ include "kubeclaw.statePvcName" . }}-{{ include "kubeclaw.gatewayName" . }}-0
            {{- if .Values.persistence.splitVolumes }}
            - name: {{ include "kubeclaw.workspacePvcName" . }}
              persistentVolumeClaim:
                claimName: {{ include "kubeclaw.workspacePvcName" . }}-{{ include "kubeclaw.gatewayName" . }}-0
            {{- end }}
            - name: tmp
              emptyDir:
                sizeLimit: 50Mi
{{- end }}
