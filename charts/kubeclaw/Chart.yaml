apiVersion: v2
name: kubeclaw
description: >
  KubeClaw is production-grade OpenClaw on Kubernetes.
  It is designed for operators who want a secure, observable, and reliable
  deployment path without giving up flexibility.
type: application
version: 2026.4.2-cc.3
appVersion: "2026.5.22"
dependencies:
  - name: litellm-helm
    version: "1.81.13"
    repository: "oci://ghcr.io/berriai"
    condition: litellm.enabled
    alias: litellm
  - name: clickstack
    version: "1.1.1"
    repository: "https://clickhouse.github.io/ClickStack-helm-charts"
    condition: observability.enabled
    alias: clickstack
  - name: gateway-helm
    version: "v1.3.0"
    repository: "oci://docker.io/envoyproxy"
    condition: gatewayAPI.controller.enabled
    alias: envoy-gateway
keywords:
  - kubeclaw
  - openclaw
  - ai
  - automation
  - gateway
  - websocket
home: https://github.com/iMerica/kubeclaw
sources:
  - https://github.com/iMerica/kubeclaw
maintainers:
  - name: KubeClaw
    url: https://kubeclaw.dev
annotations:
  artifacthub.io/license: Apache-2.0
  artifacthub.io/signKey: |
    fingerprint: <GPG_FINGERPRINT>
    url: https://kubeclaw.dev/gpg.asc
